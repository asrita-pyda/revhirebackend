spring.datasource.url=jdbc:h2:mem:revhire_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Suppress Hibernate warnings when dropping FK constraints on a fresh H2 db
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false

spring.mail.username=test@localhost
